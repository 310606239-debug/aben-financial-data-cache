name: Update cached prices

on:
  workflow_dispatch:
  schedule:
    # 06:30 Asia/Shanghai, after the regular US market close.
    - cron: "30 22 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-cached-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: python -m scripts.update_prices
      - run: python -m scripts.rebuild_manifest
      - name: Commit refreshed prices
        run: |
          if git diff --quiet -- cache; then
            echo "No price changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cache
          git commit -m "Update cached prices"
          git push
